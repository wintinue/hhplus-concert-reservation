=openapi: 3.1.0
info:
  title: Concert Reservation API
  version: 0.1.0
  description: |
    항해 플러스 Step 02 과제용 콘서트 예약 서비스 API 명세 뼈대입니다.
    구현 전 설계 산출물 작성을 목적으로 하며, 실제 필드/정책은 팀 규칙에 맞게 보완하세요.
servers:
  - url: http://localhost:8080
    description: local
tags:
  - name: Auth
  - name: Concert
  - name: Reservation
  - name: Payment
paths:
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: 회원 가입
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/concerts:
    get:
      tags: [Concert]
      summary: 콘서트 목록 조회
      operationId: getConcerts
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConcertListResponse"

  /api/v1/concerts/{concertId}/schedules:
    get:
      tags: [Concert]
      summary: 콘서트 회차 조회
      operationId: getConcertSchedules
      parameters:
        - $ref: "#/components/parameters/ConcertId"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/schedules/{scheduleId}/seats:
    get:
      tags: [Concert]
      summary: 좌석 현황 조회
      operationId: getSeats
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeatListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/reservations/holds:
    post:
      tags: [Reservation]
      summary: 좌석 선점 (임시 배정)
      operationId: holdSeats
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HoldSeatRequest"
      responses:
        "201":
          description: 선점 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HoldSeatResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 이미 선점/판매된 좌석 포함
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/reservations:
    post:
      tags: [Reservation]
      summary: 예약 확정 (결제 성공 이후)
      operationId: createReservation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "201":
          description: 예약 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      tags: [Reservation]
      summary: 내 예약 목록 조회
      operationId: getMyReservations
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/reservations/{reservationId}:
    get:
      tags: [Reservation]
      summary: 예약 상세 조회
      operationId: getReservation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/reservations/{reservationId}/cancel:
    post:
      tags: [Reservation]
      summary: 예약 취소
      operationId: cancelReservation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      responses:
        "200":
          description: 취소 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/payments:
    post:
      tags: [Payment]
      summary: 결제 요청
      operationId: payReservation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "201":
          description: 결제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ConcertId:
      name: concertId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ScheduleId:
      name: scheduleId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ReservationId:
      name: reservationId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 상태 충돌
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: 유효성 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [code, message, timestamp]
      properties:
        code:
          type: string
          example: RESERVATION_CONFLICT
        message:
          type: string
          example: 이미 판매된 좌석이 포함되어 있습니다.
        timestamp:
          type: string
          format: date-time

    SignUpRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthTokenResponse:
      type: object
      required: [accessToken, tokenType, expiresIn]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600

    ConcertSummary:
      type: object
      required: [concertId, title, bookingOpenAt, bookingCloseAt]
      properties:
        concertId:
          type: integer
          format: int64
        title:
          type: string
        bookingOpenAt:
          type: string
          format: date-time
        bookingCloseAt:
          type: string
          format: date-time

    ConcertListResponse:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConcertSummary"
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer

    ScheduleSummary:
      type: object
      required: [scheduleId, startAt, venueName]
      properties:
        scheduleId:
          type: integer
          format: int64
        startAt:
          type: string
          format: date-time
        venueName:
          type: string

    ScheduleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleSummary"

    SeatSummary:
      type: object
      required: [seatId, section, row, number, price, status]
      properties:
        seatId:
          type: integer
          format: int64
        section:
          type: string
        row:
          type: string
        number:
          type: string
        price:
          type: integer
          format: int64
        status:
          type: string
          enum: [AVAILABLE, HELD, SOLD]

    SeatListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SeatSummary"

    HoldSeatRequest:
      type: object
      required: [scheduleId, seatIds]
      properties:
        scheduleId:
          type: integer
          format: int64
        seatIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64

    HoldSeatResponse:
      type: object
      required: [holdId, holdExpiresAt, seatIds, totalAmount]
      properties:
        holdId:
          type: string
          description: "선점 토큰(예: Redis key)"
        holdExpiresAt:
          type: string
          format: date-time
        seatIds:
          type: array
          items:
            type: integer
            format: int64
        totalAmount:
          type: integer
          format: int64

    CreateReservationRequest:
      type: object
      required: [holdId]
      properties:
        holdId:
          type: string

    ReservationResponse:
      type: object
      required:
        [reservationId, userId, scheduleId, seatIds, totalAmount, status, createdAt]
      properties:
        reservationId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        scheduleId:
          type: integer
          format: int64
        seatIds:
          type: array
          items:
            type: integer
            format: int64
        totalAmount:
          type: integer
          format: int64
        status:
          type: string
          enum: [PENDING_PAYMENT, CONFIRMED, CANCELED, EXPIRED]
        createdAt:
          type: string
          format: date-time

    ReservationListResponse:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReservationResponse"
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer

    PaymentRequest:
      type: object
      required: [reservationId, amount, method]
      properties:
        reservationId:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
        method:
          type: string
          enum: [CARD, BANK_TRANSFER, SIMPLE_PAY]

    PaymentResponse:
      type: object
      required: [paymentId, reservationId, amount, status, paidAt]
      properties:
        paymentId:
          type: integer
          format: int64
        reservationId:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
        status:
          type: string
          enum: [SUCCESS, FAILED, CANCELED]
        paidAt:
          type: string
          format: date-time
